<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HealthProcure Intel — LinkedIn Banner</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Inter', sans-serif;
      padding: 20px;
    }

    .container {
      width: 1584px;
      height: 396px;
      background: linear-gradient(135deg, #ffffff 0%, #fafafa 100%);
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      display: flex;
      align-items: center;
      padding: 0 80px;
    }

    /* Decorative elements */
    .accent-circle-1 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(201, 169, 110, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      top: -100px;
      right: -50px;
      z-index: 0;
    }

    .accent-circle-2 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(13, 148, 136, 0.05) 0%, transparent 70%);
      border-radius: 50%;
      bottom: -80px;
      left: 100px;
      z-index: 0;
    }

    .accent-line {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, transparent, #c9a96e 20%, #d4af37 50%, #c9a96e 80%, transparent);
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 100px;
      width: 100%;
    }

    /* Left section */
    .left {
      flex: 1;
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .logo-box {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #c9a96e 0%, #d4af37 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(201, 169, 110, 0.2);
    }

    .company-name {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .company-name em {
      font-style: normal;
      background: linear-gradient(135deg, #c9a96e, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tagline {
      font-size: 16px;
      font-weight: 500;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }

    .description {
      font-size: 15px;
      line-height: 1.6;
      color: #555;
      max-width: 420px;
    }

    /* Right section - Stats */
    .right {
      display: flex;
      flex-direction: column;
      gap: 28px;
      justify-content: center;
    }

    .stat-group {
      display: flex;
      align-items: baseline;
      gap: 16px;
    }

    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 40px;
      font-weight: 700;
      background: linear-gradient(135deg, #c9a96e, #d4af37);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 16px;
      right: 80px;
      font-size: 12px;
      color: #aaa;
      z-index: 2;
    }

    .footer em {
      font-style: normal;
      color: #c9a96e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="accent-circle-1"></div>
    <div class="accent-circle-2"></div>
    <div class="accent-line"></div>

    <div class="content">
      <div class="left">
        <div class="logo-section">
          <div class="logo-box">HP</div>
          <div class="company-name">Health<em>Procure</em> Intel</div>
        </div>
        <div class="tagline">Global Healthcare Procurement</div>
        <div class="description">Real-time intelligence from $50B+ in government healthcare tenders across 85+ countries.</div>
      </div>

      <div class="right">
        <div class="stat-group">
          <div class="stat-number">$50B+</div>
          <div class="stat-label">Tenders Aggregated</div>
        </div>
        <div class="stat-group">
          <div class="stat-number">85+</div>
          <div class="stat-label">Countries Covered</div>
        </div>
        <div class="stat-group">
          <div class="stat-number">4</div>
          <div class="stat-label">Government Sources</div>
        </div>
      </div>
    </div>

    <div class="footer">hello@<em>healthprocureintel</em>.com</div>
  </div>
</body>
</html>
