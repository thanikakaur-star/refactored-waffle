<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LinkedIn Company Banner — HealthProcure Intel</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

    .banner {
      width: 1128px;
      height: 191px;
      background: #0a0a0f;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      padding: 0 60px;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, #0d0f16 0%, #0a0a0f 50%, #0e1019 100%);
    }

    .orb {
      position: absolute;
      width: 500px;
      height: 500px;
      top: -250px;
      left: 150px;
      background: radial-gradient(circle, rgba(201,169,110,0.03) 0%, transparent 60%);
    }

    .h-lines {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 46px,
        rgba(201,169,110,0.02) 46px,
        rgba(201,169,110,0.02) 47px
      );
    }

    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(201,169,110,0.1) 15%,
        #c9a96e 40%,
        #d4af37 50%,
        #c9a96e 60%,
        rgba(201,169,110,0.1) 85%,
        transparent 100%
      );
    }

    .left {
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      z-index: 2;
    }

    .logo-box {
      width: 48px;
      height: 48px;
      background: rgba(201,169,110,0.06);
      border: 1px solid rgba(201,169,110,0.18);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      font-size: 20px;
      color: #c9a96e;
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .brand-name {
      font-family: 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: -0.3px;
    }
    .brand-name em {
      font-style: normal;
      color: #c9a96e;
    }

    .brand-tagline {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      color: #64748b;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .divider {
      width: 1px;
      height: 80px;
      background: linear-gradient(180deg, transparent, rgba(201,169,110,0.1), transparent);
      margin: 0 50px;
      position: relative;
      z-index: 2;
    }

    .sources {
      display: flex;
      gap: 32px;
      position: relative;
      z-index: 2;
    }

    .source {
      text-align: center;
    }

    .source-name {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #c9a96e;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }

    .source-desc {
      font-family: 'Inter', sans-serif;
      font-size: 10px;
      font-weight: 400;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .url {
      position: absolute;
      bottom: 14px;
      right: 60px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: #334155;
      letter-spacing: 0.5px;
      z-index: 2;
    }
    .url em {
      font-style: normal;
      color: rgba(201,169,110,0.5);
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="bg"></div>
    <div class="orb"></div>
    <div class="h-lines"></div>
    <div class="bottom-bar"></div>

    <div class="left">
      <div class="logo-box">HP</div>
      <div class="brand">
        <div class="brand-name">Health<em>Procure</em> Intel</div>
        <div class="brand-tagline">Global Healthcare Procurement Intelligence</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="sources">
      <div class="source">
        <div class="source-name">TED Europa</div>
        <div class="source-desc">EU Tenders</div>
      </div>
      <div class="source">
        <div class="source-name">SAM.gov</div>
        <div class="source-desc">US Federal</div>
      </div>
      <div class="source">
        <div class="source-name">WHO</div>
        <div class="source-desc">Global</div>
      </div>
      <div class="source">
        <div class="source-name">NHS</div>
        <div class="source-desc">UK Health</div>
      </div>
    </div>

    <div class="url"><em>healthprocureintel</em>.com</div>
  </div>
</body>
</html>
