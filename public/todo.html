<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch Checklist — HealthProcure Intel</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: #f1f5f9;
      margin-bottom: 4px;
    }
    h1 em { font-style: normal; color: #c9a96e; }
    .subtitle {
      color: #64748b;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .progress-bar {
      width: 100%;
      height: 6px;
      background: #1e293b;
      border-radius: 3px;
      margin-bottom: 32px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #c9a96e, #d4af37);
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .progress-text {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }
    .progress-text span { color: #c9a96e; font-weight: 600; }
    .section {
      margin-bottom: 28px;
    }
    .section-header {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #475569;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(201,169,110,0.08);
    }
    .task {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .task:hover { background: rgba(201,169,110,0.04); }
    .task.done .task-text { text-decoration: line-through; color: #475569; }
    .task.done .task-desc { color: #334155; }
    .checkbox {
      width: 20px;
      height: 20px;
      min-width: 20px;
      border: 2px solid #334155;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
      transition: all 0.2s;
    }
    .task.done .checkbox {
      background: #c9a96e;
      border-color: #c9a96e;
    }
    .checkbox svg {
      width: 12px;
      height: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .task.done .checkbox svg { opacity: 1; }
    .task-text {
      font-size: 15px;
      font-weight: 500;
      color: #e2e8f0;
      line-height: 1.4;
    }
    .task-desc {
      font-size: 13px;
      color: #64748b;
      margin-top: 2px;
      line-height: 1.4;
    }
    .add-task {
      display: flex;
      gap: 8px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid rgba(201,169,110,0.08);
    }
    .add-task input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-task input:focus { border-color: #c9a96e; }
    .add-task input::placeholder { color: #475569; }
    .add-task button {
      background: linear-gradient(135deg, #c9a96e, #d4af37);
      border: none;
      border-radius: 8px;
      padding: 10px 20px;
      color: #0a0a0f;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .add-task button:hover { opacity: 0.9; }
    .delete-btn {
      opacity: 0;
      background: none;
      border: none;
      color: #475569;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      margin-left: auto;
      transition: opacity 0.15s, color 0.15s;
    }
    .task:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: #ef4444; }
    .back-link {
      display: inline-block;
      margin-bottom: 24px;
      font-size: 13px;
      color: #64748b;
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: #c9a96e; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">&larr; Back to site</a>
    <h1>Launch <em>Checklist</em></h1>
    <div class="subtitle">Track your post-launch progress</div>

    <div class="progress-text">
      <span id="progress-label">0 / 0 complete</span>
      <span id="progress-pct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <div id="tasks-container"></div>

    <div class="add-task">
      <input type="text" id="new-task" placeholder="Add a new task..." />
      <button onclick="addCustomTask()">Add</button>
    </div>
  </div>

  <script>
    var DEFAULT_TASKS = [
      { section: "Launch Day", items: [
        { id: "ld1", text: "LinkedIn company page created", desc: "Logo, banner, about section filled in", done: true },
        { id: "ld2", text: "First company page post published", desc: "Launch announcement from HealthProcure Intel page", done: true },
        { id: "ld3", text: "Personal LinkedIn launch post published", desc: "Story-driven post from your personal profile", done: true },
        { id: "ld4", text: "Website live on custom domain", desc: "healthprocureintel.com via Railway + Cloudflare", done: true },
        { id: "ld5", text: "Stripe checkout working", desc: "Subscribe buttons wired to Stripe for Basic/Pro/Enterprise", done: true },
      ]},
      { section: "First Week", items: [
        { id: "fw1", text: "Invite LinkedIn connections to follow page", desc: "Use the 50 invite credits on your company page", done: false },
        { id: "fw2", text: "Post 3 more times on LinkedIn", desc: "Share specific tender examples with real data", done: false },
        { id: "fw3", text: "DM 10 potential users", desc: "Medical device sales reps, procurement consultants", done: false },
        { id: "fw4", text: "Post on Reddit", desc: "r/healthIT, r/medicaldevices, r/govcon — share insights, not ads", done: false },
        { id: "fw5", text: "Get first 5 free signups", desc: "Friends, classmates, LinkedIn connections", done: false },
      ]},
      { section: "First Month", items: [
        { id: "fm1", text: "Reach 25 free users", desc: "Track signups through the API key dashboard", done: false },
        { id: "fm2", text: "First paying customer", desc: "Convert a free user to Basic, Pro, or Enterprise", done: false },
        { id: "fm3", text: "Collect 5 user feedback sessions", desc: "15-min calls with early users — what's missing?", done: false },
        { id: "fm4", text: "Add email alerts feature", desc: "Users get notified when new tenders match their criteria", done: false },
        { id: "fm5", text: "LinkedIn: 100 followers on company page", desc: "Consistent posting + engagement", done: false },
      ]},
      { section: "Growth", items: [
        { id: "gr1", text: "Partner with a procurement consultant", desc: "Offer free Pro tier in exchange for referrals", done: false },
        { id: "gr2", text: "Attend a healthcare procurement event", desc: "Network in person, demo the platform", done: false },
        { id: "gr3", text: "Write a blog post with procurement data insights", desc: "Use your own data to create original content", done: false },
        { id: "gr4", text: "Reach $1K MRR", desc: "First revenue milestone", done: false },
      ]},
    ];

    function loadTasks() {
      var saved = localStorage.getItem('hpi-todo');
      if (saved) {
        try { return JSON.parse(saved); } catch(e) {}
      }
      return JSON.parse(JSON.stringify(DEFAULT_TASKS));
    }

    function saveTasks(tasks) {
      localStorage.setItem('hpi-todo', JSON.stringify(tasks));
    }

    function render() {
      var tasks = loadTasks();
      var container = document.getElementById('tasks-container');
      container.innerHTML = '';
      var total = 0, completed = 0;

      tasks.forEach(function(section) {
        var sec = document.createElement('div');
        sec.className = 'section';
        var header = document.createElement('div');
        header.className = 'section-header';
        header.textContent = section.section;
        sec.appendChild(header);

        section.items.forEach(function(item) {
          total++;
          if (item.done) completed++;

          var task = document.createElement('div');
          task.className = 'task' + (item.done ? ' done' : '');

          task.innerHTML = '<div class="checkbox"><svg viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
            + '<div><div class="task-text">' + item.text + '</div>'
            + (item.desc ? '<div class="task-desc">' + item.desc + '</div>' : '')
            + '</div>'
            + '<button class="delete-btn" title="Delete task">&times;</button>';

          var checkbox = task.querySelector('.checkbox');
          checkbox.addEventListener('click', function(e) {
            e.stopPropagation();
            item.done = !item.done;
            saveTasks(tasks);
            render();
          });

          task.querySelector('.task-text').addEventListener('click', function() {
            item.done = !item.done;
            saveTasks(tasks);
            render();
          });

          task.querySelector('.delete-btn').addEventListener('click', function(e) {
            e.stopPropagation();
            var idx = section.items.indexOf(item);
            section.items.splice(idx, 1);
            if (section.items.length === 0) {
              tasks.splice(tasks.indexOf(section), 1);
            }
            saveTasks(tasks);
            render();
          });

          sec.appendChild(task);
        });

        container.appendChild(sec);
      });

      var pct = total > 0 ? Math.round((completed / total) * 100) : 0;
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('progress-label').textContent = completed + ' / ' + total + ' complete';
      document.getElementById('progress-pct').textContent = pct + '%';
    }

    function addCustomTask() {
      var input = document.getElementById('new-task');
      var text = input.value.trim();
      if (!text) return;

      var tasks = loadTasks();
      var customSection = tasks.find(function(s) { return s.section === 'Custom'; });
      if (!customSection) {
        customSection = { section: 'Custom', items: [] };
        tasks.push(customSection);
      }
      customSection.items.push({
        id: 'custom-' + Date.now(),
        text: text,
        desc: '',
        done: false
      });
      saveTasks(tasks);
      input.value = '';
      render();
    }

    document.getElementById('new-task').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') addCustomTask();
    });

    render();
  </script>
</body>
</html>
